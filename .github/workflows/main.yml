name: GSM Army Runner

on:
  workflow_dispatch:

jobs:
  run-gsm:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: pip install groq

      - name: Run GSM Logic
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python bot.py
        
